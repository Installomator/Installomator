name: Assemble and open PR

on:
  workflow_dispatch:
    inputs:
      create_draft:
        description: "Create as draft PR"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  pull-requests: write

jobs:
  assemble:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run assemble.sh
        run: |
          ./assemble.sh --script
          echo "Assembly completed successfully"

      - name: Validate labels
        run: |
          echo "Running label validation..."
          ./utils/checkLabels.sh
          echo "Label validation passed"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet Installomator.sh Labels.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in Installomator.sh and/or Labels.txt"
            git diff --stat Installomator.sh Labels.txt
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: regenerate Installomator.sh and Labels.txt from latest
            labels"
          title: "🤖 Regenerate Installomator.sh and Labels.txt"
          body: |
            Automated rebuild of Installomator.sh and Labels.txt from the latest label fragments.

            **Changes:**
            - Assembled from all labels in `fragments/labels/`
            - Updated `Labels.txt` with current available labels

            Generated by [manual-assemble workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          branch: auto/assemble-${{ github.run_id }}
          delete-branch: false
          draft: ${{ inputs.create_draft }}
          labels: "bot:auto-generated,type:maintenance"
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

      - name: Summary
        if: always()
        run: |
          echo "## Assembly Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "✅ Changes detected and PR created/updated" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes detected - no PR created" >> $GITHUB_STEP_SUMMARY
          fi
